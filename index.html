<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f39c12; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
  .welcome-container { background: white; margin: 20px; padding: 40px 20px; border-radius: 30px; text-align: center; box-shadow: 0 15px 30px rgba(0,0,0,0.2); }
  .logo-placeholder { font-size: 50px; margin-bottom: 10px; }
  .app-name { font-size: 26px; font-weight: bold; color: #2c3e50; margin-bottom: 5px; letter-spacing: 1px; }
  .tagline { color: #7f8c8d; font-size: 14px; margin-bottom: 30px; }
  .input-group { margin-bottom: 20px; text-align: left; }
  input { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
  .login-btn { width: 100%; background: #2c3e50; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
</style>
</head>
<body>
<div class="welcome-container">
  <div class="logo-placeholder">🛵</div>
  <div class="app-name">BIKE BROTHER</div>
  <div class="tagline">ಯಲಹಂಕದ ವೇಗದ ರೈಡಿಂಗ್ ಮತ್ತು ಡೆಲಿವರಿ ಸೇವೆ</div>
  <div class="input-group"><input type="text" placeholder="ನಿಮ್ಮ ಹೆಸರು"></div>
  <div class="input-group"><input type="tel" placeholder="ಫೋನ್ ನಂಬರ್ (+91)"></div>
  <button class="login-btn" onclick="alert('OTP ಕಳುಹಿಸಲಾಗಿದೆ! ಬೈಕ್ ಬ್ರದರ್ ತಂಡಕ್ಕೆ ಸುಸ್ವಾಗತ...')">ಲಾಗಿನ್ ಮಾಡಿ</button>
</div>
</body>
</html>
