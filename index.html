<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f4f4; }
        #map { height: 300px; width: 100%; border-bottom: 2px solid #1a237e; }
        .container { padding: 20px; text-align: center; background: white; border-radius: 20px 20px 0 0; margin-top: -20px; position: relative; z-index: 1000; }
        .logo-small { width: 80px; margin-bottom: 10px; border-radius: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .book-btn { width: 100%; background: #25D366; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="container">
    <img src="1777656375997.png" class="logo-small" alt="Logo">
    <div style="font-weight: bold; color: #1a237e; font-size: 20px;">BIKE BROTHER</div>
    <p style="font-size: 12px; color: #666;">ಬೆಂಗಳೂರು ವೇಗದ ರೈಡಿಂಗ್</p>
    
    <input type="text" id="custName" placeholder="👤 ನಿಮ್ಮ ಹೆಸರು">
    <input type="text" id="pickup" placeholder="📍 ಪಿಕ್-ಅಪ್ ಲೊಕೇಶನ್">
    <input type="text" id="drop" placeholder="🏁 ಎಲ್ಲಿಗೆ ಹೋಗಬೇಕು?">
    
    <button class="book-btn" onclick="sendWhatsApp()">ವಾಟ್ಸಾಪ್ ಮೂಲಕ ಬುಕ್ ಮಾಡಿ 🛵</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([12.9716, 77.5946], 12); 
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.marker([12.9716, 77.5946]).addTo(map).bindPopup('BIKE BROTHER').openPopup();

    function sendWhatsApp() {
        var name = document.getElementById('custName').value;
        var pickup = document.getElementById('pickup').value;
        var drop = document.getElementById('drop').value;
        var myNumber = "918296715694"; // ನಿನ್ನ ನಂಬರ್ ಸೆಟ್ ಮಾಡಿದ್ದೇನೆ

        if(name && pickup && drop) {
            var message = "ಹಲೋ BIKE BROTHER, ನಾನು ರೈಡ್ ಬುಕ್ ಮಾಡಬೇಕಿದೆ.%0A%0A👤 ಹೆಸರು: " + name + "%0A📍 ಪಿಕ್-ಅಪ್: " + pickup + "%0A🏁 ಡ್ರಾಪ್: " + drop;
            window.open("https://wa.me/" + myNumber + "?text=" + message, '_blank');
        } else {
            alert("ದಯವಿಟ್ಟು ಎಲ್ಲಾ ಮಾಹಿತಿಯನ್ನು ಭರ್ತಿ ಮಾಡಿ!");
        }
    }
</script>

</body>
</html>
