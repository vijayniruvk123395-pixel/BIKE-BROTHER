<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; }
        #map { height: 250px; width: 100%; border-bottom: 3px solid #1a237e; }
        .container { padding: 20px; text-align: center; background: white; border-radius: 25px 25px 0 0; margin-top: -25px; position: relative; z-index: 1000; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); }
        .logo-small { width: 70px; border-radius: 12px; margin-bottom: 5px; }
        .tab-box { display: flex; justify-content: space-around; margin: 15px 0; background: #f1f1f1; border-radius: 10px; padding: 5px; }
        .tab-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: none; transition: 0.3s; }
        .active-tab { background: #1a237e; color: white; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        .book-btn { width: 100%; background: #25D366; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="map"></div>

<div class="container">
    <img src="1777656375997.png" class="logo-small" alt="BIKE BROTHER">
    <div style="font-weight: bold; color: #1a237e; font-size: 22px;">BIKE BROTHER</div>
    <p style="font-size: 12px; color: #666; margin: 5px 0;">ಬೆಂಗಳೂರು ವೇಗದ ಸೇವೆ 🛵📦</p>

    <div class="tab-box">
        <button id="btnRide" class="tab-btn active-tab" onclick="showForm('ride')">🛵 Ride</button>
        <button id="btnDel" class="tab-btn" onclick="showForm('delivery')">📦 Delivery</button>
    </div>

    <div id="rideForm">
        <input type="text" id="custName" placeholder="👤 ನಿಮ್ಮ ಹೆಸರು">
        <input type="text" id="pickup" placeholder="📍 ಎಲ್ಲಿಂದ? (Pick-up)">
        <input type="text" id="drop" placeholder="🏁 ಎಲ್ಲಿಗೆ? (Drop)">
        <button class="book-btn" onclick="sendRide()">ರೈಡ್ ಬುಕ್ ಮಾಡಿ</button>
    </div>

    <div id="deliveryForm" style="display:none;">
        <input type="text" id="delCustName" placeholder="👤 ನಿಮ್ಮ ಹೆಸರು">
        <input type="text" id="storeName" placeholder="🏪 ಅಂಗಡಿ/ಹೋಟೆಲ್ ಹೆಸರು">
        <input type="text" id="items" placeholder="🛍️ ಏನೇನು ತರಬೇಕು?">
        <input type="text" id="delAddress" placeholder="🏠 ಡೆಲಿವರಿ ವಿಳಾಸ">
        <button class="book-btn" style="background: #FF9800;" onclick="sendDel()">ಡೆಲಿವರಿ ಬುಕ್ ಮಾಡಿ</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([12.9716, 77.5946], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.marker([12.9716, 77.5946]).addTo(map).bindPopup('BIKE BROTHER').openPopup();

    var myNum = "918867285801";

    function showForm(type) {
        if(type === 'ride') {
            document.getElementById('rideForm').style.display = 'block';
            document.getElementById('deliveryForm').style.display = 'none';
            document.getElementById('btnRide').classList.add('active-tab');
            document.getElementById('btnDel').classList.remove('active-tab');
        } else {
            document.getElementById('rideForm').style.display = 'none';
            document.getElementById('deliveryForm').style.display = 'block';
            document.getElementById('btnDel').classList.add('active-tab');
            document.getElementById('btnRide').classList.remove('active-tab');
        }
    }

    function sendRide() {
        var n = document.getElementById('custName').value;
        var p = document.getElementById('pickup').value;
        var d = document.getElementById('drop').value;
        if(n && p && d) {
            var msg = "ಹಲೋ BIKE BROTHER, ರೈಡ್ ಬುಕಿಂಗ್:%0A👤 ಹೆಸರು: "+n+"%0A📍 ಪಿಕ್-ಅಪ್: "+p+"%0A🏁 ಡ್ರಾಪ್: "+d;
            window.location.href = "https://wa.me/" + myNum + "?text=" + msg;
        } else { alert("ಎಲ್ಲಾ ಮಾಹಿತಿ ಭರ್ತಿ ಮಾಡಿ!"); }
    }

    function sendDel() {
        var n = document.getElementById('delCustName').value;
        var s = document.getElementById('storeName').value;
        var i = document.getElementById('items').value;
        var a = document.getElementById('delAddress').value;
        if(n && s && i && a) {
            var msg = "ಹಲೋ BIKE BROTHER, ಡೆಲಿವರಿ ಆರ್ಡರ್:%0A👤 ಹೆಸರು: "+n+"%0A🏪 ಅಂಗಡಿ: "+s+"%0A🛍️ ವಸ್ತುಗಳು: "+i+"%0A🏠 ವಿಳಾಸ: "+a;
            window.location.href = "https://wa.me/" + myNum + "?text=" + msg;
        } else { alert("ಎಲ್ಲಾ ಮಾಹಿತಿ ಭರ್ತಿ ಮಾಡಿ!"); }
    }
</script>
</body>
</html>
