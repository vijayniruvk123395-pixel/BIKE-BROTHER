<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f4f4; }
        #map { height: 300px; width: 100%; border-bottom: 2px solid #1a237e; }
        .container { padding: 20px; text-align: center; background: white; border-radius: 20px -20px 0 0; margin-top: -20px; position: relative; z-index: 1000; }
        .logo-small { width: 80px; margin-bottom: 10px; border-radius: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .book-btn { width: 100%; background: #1a237e; color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="map"></div>

<div class="container">
    <img src="1777656375997.png" class="logo-small" alt="Logo">
    <div style="font-weight: bold; color: #1a237e; font-size: 20px;">BIKE BROTHER</div>
    <p style="font-size: 12px; color: #666;">ಬೆಂಗಳೂರು ವೇಗದ ರೈಡಿಂಗ್</p>
    
    <input type="text" placeholder="📍 ಪಿಕ್-ಅಪ್ ಲೊಕೇಶನ್">
    <input type="text" placeholder="🏁 ಎಲ್ಲಿಗೆ ಹೋಗಬೇಕು?">
    
    <button class="book-btn" onclick="alert('ನಿಮ್ಮ ಲೊಕೇಶನ್ ಹುಡುಕಲಾಗುತ್ತಿದೆ...')">ಬುಕ್ ಮಾಡಿ</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // ಬೆಂಗಳೂರು ಲೊಕೇಶನ್ ಸೆಟ್ ಮಾಡಲಾಗುತ್ತಿದೆ
    var map = L.map('map').setView([12.9716, 77.5946], 12); 
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);
    L.marker([12.9716, 77.5946]).addTo(map).bindPopup('BIKE BROTHER ಲಭ್ಯವಿದೆ').openPopup();
</script>

</body>
</html>
