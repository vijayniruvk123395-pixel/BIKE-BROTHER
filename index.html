
    <div id="rideForm">
        <input type="text" id="custName" placeholder="👤 ನಿಮ್ಮ ಹೆಸರು">
        <input type="text" id="pickup" placeholder="📍 ಎಲ್ಲಿಂದ?">
        <input type="text" id="drop" placeholder="🏁 ಎಲ್ಲಿಗೆ?">
        <button class="book-btn" onclick="sendRide()">ರೈಡ್ ಬುಕ್ ಮಾಡಿ</button>
    </div>

    <div id="deliveryForm" style="display:none;">
        <input type="text" id="delCustName" placeholder="👤 ನಿಮ್ಮ ಹೆಸರು">
        <input type="text" id="storeName" placeholder="🏪 ಅಂಗಡಿ ಹೆಸರು">
        <input type="text" id="items" placeholder="🛍️ ಏನೇನು ತರಬೇಕು?">
        <input type="text" id="delAddress" placeholder="🏠 ಡೆಲಿವರಿ ವಿಳಾಸ">
        <button class="book-btn" style="background: #FF9800;" onclick="sendDel()">ಡೆಲಿವರಿ ಬುಕ್ ಮಾಡಿ</button>
    </div>

    <div class="pay-section">
        <p style="font-weight: bold; color: #1a237e; margin-bottom: 10px;">ಸುಲಭವಾಗಿ ಪಾವತಿಸಿ 💳</p>
        <button class="pay-btn" onclick="payUPI()">Pay with PhonePe / GPay</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    var map = L.map('map').setView([12.9716, 77.5946], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    L.marker([12.9716, 77.5946]).addTo(map).bindPopup('BIKE BROTHER');

    var myNum = "918867285801";

    function showForm(type) {
        if(type === 'ride') {
            document.getElementById('rideForm').style.display = 'block';
            document.getElementById('deliveryForm').style.display = 'none';
            document.getElementById('btnRide').classList.add('active-tab');
            document.getElementById('btnDel').classList.remove('active-tab');
        } else {
            document.getElementById('rideForm').style.display = 'none';
            document.getElementById('deliveryForm').style.display = 'block';
            document.getElementById('btnDel').classList.add('active-tab');
            document.getElementById('btnRide').classList.remove('active-tab');
        }
    }

    function sendRide() {
        var n = document.getElementById('custName').value;
        var p = document.getElementById('pickup').value;
        var d = document.getElementById('drop').value;
        if(n && p && d) {
            var msg = "ಹಲೋ BIKE BROTHER, ರೈಡ್ ಬುಕಿಂಗ್ (First Ride Discount Offer):%0A👤 ಹೆಸರು: "+n+"%0A📍 ಪಿಕ್-ಅಪ್: "+p+"%0A🏁 ಡ್ರಾಪ್: "+d;
            window.location.href = "https://wa.me/" + myNum + "?text=" + msg;
        } else { alert("ಮಾಹಿತಿ ಭರ್ತಿ ಮಾಡಿ!"); }
    }

    function sendDel() {
        var n = document.getElementById('delCustName').value;
        var s = document.getElementById('storeName').value;
        var i = document.getElementById('items').value;
        var a = document.getElementById('delAddress').value;
        if(n && s && i && a) {
            var msg = "ಹಲೋ BIKE BROTHER, ಡೆಲಿವರಿ ಆರ್ಡರ್ (First Order Discount):%0A👤 ಹೆಸರು: "+n+"%0A🏪 ಅಂಗಡಿ: "+s+"%0A🛍️ ವಸ್ತುಗಳು: "+i+"%0A🏠 ವಿಳಾಸ: "+a;
            window.location.href = "https://wa.me/" + myNum + "?text=" + msg;
        } else { alert("ಮಾಹಿತಿ ಭರ್ತಿ ಮಾಡಿ!"); }
    }

    function payUPI() {
        var upiId = "8867285801@ybl"; 
        window.location.href = "upi://pay?pa=" + upiId + "&pn=BIKE%20BROTHER&cu=INR";
    }
</script>
